<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Lumora Rewards</title>

</head>

<body>

<div class="auth-container">

<div class="auth-box">

<h1>Welcome Back</h1>

<input type="password" id="loginPassword" placeholder="Password" required>

Login
</button>

</form>

<p class="login-link">
Don't have an account?
<a href="signup.html">
Create Account
</a>
</p>

<p class="login-link">
<a href="#">
Forgot Password?
</a>
</p>

</div>

</div>

</body>

</html>
